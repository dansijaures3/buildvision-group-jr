openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: BuildVision Group & JR Service API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: hero
  - name: services
  - name: projects
  - name: events
  - name: commerce
  - name: team
  - name: blog
  - name: partners
  - name: testimonials
  - name: quotes
  - name: contact
  - name: stats
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /hero-slides:
    get:
      operationId: listHeroSlides
      tags: [hero]
      parameters:
        - in: query
          name: activeOnly
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HeroSlide" }
    post:
      operationId: createHeroSlide
      tags: [hero]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HeroSlideInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeroSlide" }
  /hero-slides/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      operationId: updateHeroSlide
      tags: [hero]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HeroSlideInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HeroSlide" }
    delete:
      operationId: deleteHeroSlide
      tags: [hero]
      responses:
        "204": { description: No Content }

  /services:
