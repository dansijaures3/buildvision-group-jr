components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    HeroSlide:
      type: object
      required: [id, image, title, subtitle, displayOrder, isActive]
      properties:
        id: { type: integer }
        image: { type: string }
        title: { type: string }
        subtitle: { type: string }
        button1Text: { type: string, nullable: true }
        button1Link: { type: string, nullable: true }
        button2Text: { type: string, nullable: true }
        button2Link: { type: string, nullable: true }
        displayOrder: { type: integer }
        isActive: { type: boolean }
    HeroSlideInput:
      type: object
      required: [image, title, subtitle, displayOrder, isActive]
      properties:
        image: { type: string }
        title: { type: string }
        subtitle: { type: string }
        button1Text: { type: string, nullable: true }
        button1Link: { type: string, nullable: true }
        button2Text: { type: string, nullable: true }
        button2Link: { type: string, nullable: true }
        displayOrder: { type: integer }
        isActive: { type: boolean }

    Service:
      type: object
      required: [id, slug, title, category, shortDescription, fullDescription, icon, image, features]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        category: { type: string, description: "architecture|construction|evenementiel|commerce" }
        shortDescription: { type: string }
        fullDescription: { type: string }
        icon: { type: string }
        image: { type: string }
        features:
          type: array
          items: { type: string }
        displayOrder: { type: integer }
    ServiceInput:
      type: object
      required: [slug, title, category, shortDescription, fullDescription, icon, image, features]
      properties:
        slug: { type: string }
        title: { type: string }
        category: { type: string }
        shortDescription: { type: string }
        fullDescription: { type: string }
        icon: { type: string }
        image: { type: string }
        features:
          type: array
          items: { type: string }
        displayOrder: { type: integer }

    Project:
      type: object
      required: [id, code, title, category, description, coverImage, gallery, client, location, status, completedAt]
      properties:
        id: { type: integer }
        code: { type: string }
        title: { type: string }
        category: { type: string }
        description: { type: string }
        coverImage: { type: string }
        gallery:
          type: array
          items: { type: string }
        client: { type: string }
        location: { type: string }
        status: { type: string }
        completedAt: { type: string }
        featured: { type: boolean }
    ProjectInput:
      type: object
      required: [code, title, category, description, coverImage, gallery, client, location, status, completedAt]
      properties:
        code: { type: string }
        title: { type: string }
        category: { type: string }
        description: { type: string }
        coverImage: { type: string }
        gallery:
          type: array
          items: { type: string }
        client: { type: string }
        location: { type: string }
        status: { type: string }
        completedAt: { type: string }
        featured: { type: boolean }

    Event:
      type: object
      required: [id, title, description, image, location, eventDate, attendees]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        image: { type: string }
        location: { type: string }
        eventDate: { type: string }
        attendees: { type: integer }
        category: { type: string }
    EventInput:
      type: object
      required: [title, description, image, location, eventDate, attendees]
      properties:
        title: { type: string }
        description: { type: string }
        image: { type: string }
        location: { type: string }
        eventDate: { type: string }
        attendees: { type: integer }
        category: { type: string }

    CommerceItem:
      type: object
      required: [id, name, description, image, price, category, available]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        image: { type: string }
        price: { type: string }
        category: { type: string }
        available: { type: boolean }
    CommerceItemInput:
      type: object
      required: [name, description, image, price, category, available]
      properties:
        name: { type: string }
        description: { type: string }
        image: { type: string }
        price: { type: string }
        category: { type: string }
        available: { type: boolean }

    TeamMember:
      type: object
      required: [id, name, role, department, photo, bio]
      properties:
        id: { type: integer }
        name: { type: string }
        role: { type: string }
        department: { type: string }
        photo: { type: string }
        bio: { type: string }
        linkedin: { type: string, nullable: true }
        email: { type: string, nullable: true }
        displayOrder: { type: integer }
    TeamMemberInput:
      type: object
      required: [name, role, department, photo, bio]
      properties:
        name: { type: string }
        role: { type: string }
        department: { type: string }
        photo: { type: string }
        bio: { type: string }
        linkedin: { type: string, nullable: true }
        email: { type: string, nullable: true }
        displayOrder: { type: integer }

    BlogPost:
      type: object
      required: [id, slug, title, excerpt, content, coverImage, author, publishedAt]
      properties:
        id: { type: integer }
        slug: { type: string }
        title: { type: string }
        excerpt: { type: string }
        content: { type: string }
        coverImage: { type: string }
        author: { type: string }
        publishedAt: { type: string }
        tags:
          type: array
          items: { type: string }
    BlogPostInput:
      type: object
      required: [slug, title, excerpt, content, coverImage, author, publishedAt]
      properties:
        slug: { type: string }
        title: { type: string }
        excerpt: { type: string }
        content: { type: string }
        coverImage: { type: string }
        author: { type: string }
        publishedAt: { type: string }
        tags:
          type: array
          items: { type: string }

    Partner:
      type: object
      required: [id, name, logo]
      properties:
        id: { type: integer }
        name: { type: string }
        logo: { type: string }
        website: { type: string, nullable: true }
    PartnerInput:
      type: object
      required: [name, logo]
      properties:
        name: { type: string }
        logo: { type: string }
        website: { type: string, nullable: true }

    CompanyInfo:
      type: object
      required: [id, name, tagline, about, mission, vision, email, phone, whatsapp, address, city, country, hours, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        tagline: { type: string }
        about: { type: string }
        mission: { type: string }
        vision: { type: string }
        email: { type: string }
        phone: { type: string }
        whatsapp: { type: string }
        address: { type: string }
        city: { type: string }
        country: { type: string }
        hours: { type: string }
        facebook: { type: string, nullable: true }
        instagram: { type: string, nullable: true }
        linkedin: { type: string, nullable: true }
        twitter: { type: string, nullable: true }
        youtube: { type: string, nullable: true }
        logo: { type: string, nullable: true }
        updatedAt: { type: string }
    CompanyInfoInput:
      type: object
      required: [name, tagline, about, mission, vision, email, phone, whatsapp, address, city, country, hours]
      properties:
        name: { type: string }
        tagline: { type: string }
        about: { type: string }
        mission: { type: string }
        vision: { type: string }
        email: { type: string }
        phone: { type: string }
        whatsapp: { type: string }
        address: { type: string }
        city: { type: string }
        country: { type: string }
        hours: { type: string }
        facebook: { type: string, nullable: true }
        instagram: { type: string, nullable: true }
        linkedin: { type: string, nullable: true }
        twitter: { type: string, nullable: true }
        youtube: { type: string, nullable: true }
        logo: { type: string, nullable: true }

    Testimonial:
      type: object
      required: [id, name, role, company, quote, rating]
      properties:
        id: { type: integer }
        name: { type: string }
        role: { type: string }
        company: { type: string }
        quote: { type: string }
        rating: { type: integer }
        photo: { type: string, nullable: true }
    TestimonialInput:
      type: object
      required: [name, role, company, quote, rating]
      properties:
        name: { type: string }
        role: { type: string }
        company: { type: string }
        quote: { type: string }
        rating: { type: integer }
        photo: { type: string, nullable: true }

    QuoteRequest:
      type: object
      required: [id, name, email, phone, company, projectType, budget, description, status, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        company: { type: string }
        projectType: { type: string }
        budget: { type: string }
        description: { type: string }
        status: { type: string }
        createdAt: { type: string }
    QuoteRequestInput:
      type: object
      required: [name, email, phone, company, projectType, budget, description]
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: string }
