kind = "web"
previewPath = "/"
title = "BuildVision Group & JR Service"
version = "1.0.0"
id = "artifacts/buildvision"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20446

[services.development]
run = "pnpm --filter @workspace/buildvision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buildvision", "run", "build" ]
publicDir = "artifacts/buildvision/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20446"
BASE_PATH = "/"
